<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TURNOS BARRAKA IKASTOLA / IKASTOLAKO BARRAKA TXANDAK</title>
    <style>
        :root {
            --bg: #f7f7f5;
            --card: #ffffff;
            --text: #1f2933;
            --muted: #667085;
            --line: #e4e7ec;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --danger: #dc2626;
            --ok: #15803d;
            --warning: #f59e0b;
            --radius: 18px;
            --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top left, #eef6ff, var(--bg) 42%);
            color: var(--text);
        }

        header {
            padding: 28px 18px 16px;
            text-align: center;
            position: relative;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1120px;
            margin: 0 auto 16px;
            flex-wrap: wrap;
            gap: 10px;
        }

        h1 {
            margin: 0 0 6px;
            font-size: clamp(1.8rem, 5vw, 3rem);
            letter-spacing: -0.04em;
            flex: 1;
            text-align: center;
        }

        .subtitle {
            margin: 0 auto;
            max-width: 720px;
            color: var(--muted);
            line-height: 1.5;
        }

        .lang-toggle {
            display: flex;
            background: #eef2ff;
            border-radius: 999px;
            padding: 3px;
            gap: 2px;
            flex-shrink: 0;
        }

        .lang-toggle button {
            background: transparent;
            color: var(--primary);
            font-weight: 700;
            font-size: .85rem;
            padding: 6px 14px;
            border-radius: 999px;
            transition: background .2s, color .2s, transform 0s;
        }

        .lang-toggle button:hover {
            background: #dbeafe;
            transform: none;
        }

        .lang-toggle button.active {
            background: var(--primary);
            color: white;
        }

        .my-shifts-cta {
            display: flex;
            align-items: center;
            gap: 8px;
            background: white;
            border: 1.5px solid var(--line);
            border-radius: 999px;
            padding: 8px 18px;
            font-weight: 700;
            font-size: .95rem;
            color: var(--primary);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(37,99,235,.10);
            transition: box-shadow .2s, background .15s, transform .15s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .my-shifts-cta:hover {
            background: #eef2ff;
            box-shadow: 0 4px 16px rgba(37,99,235,.18);
            transform: translateY(-1px);
        }

        .my-shifts-cta svg {
            flex-shrink: 0;
        }

        main {
            width: 80%;
            margin: 0 auto 44px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            margin: 18px 0;
            flex-wrap: wrap;
        }

        .status {
            color: var(--muted);
            font-size: 0.95rem;
        }

        input:not([type="checkbox"]):required.user-invalid,
        select:required.user-invalid,
        textarea:required.user-invalid {
            background: #fef2f2;
            border-color: #d93025;
            box-shadow: 0 0 0 3px rgba(217, 48, 37, .12);
        }

        .required-star {
            color: #d93025;
            font-weight: 850;
            margin-left: 4px;
        }

        .summary-card {
            display: none;
            grid-template-columns: 1fr;
            gap: 12px;
            align-items: stretch;
            background: rgba(255,255,255,.82);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
            padding: 14px;
            margin: 0 0 18px;
        }

        .summary-card.show {
            display: grid;
        }

        .summary-main {
            display: grid;
            grid-template-columns: repeat(4, minmax(140px, 1fr));
            gap: 12px;
        }

        .summary-item {
            background: #fff;
            border: 1px solid #eef2f7;
            border-radius: 14px;
            padding: 12px 14px;
        }

        .summary-value {
            display: block;
            font-size: 1.45rem;
            font-weight: 850;
            letter-spacing: -0.03em;
            color: var(--text);
        }

        .summary-label {
            color: var(--muted);
            font-size: .9rem;
            font-weight: 650;
        }

        .summary-days {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 8px;
            margin-top: 4px;
        }

        .summary-day {
            width: 100%;
            text-align: left;
            background: #f8fafc;
            border: 1px solid #e4e7ec;
            border-radius: 12px;
            padding: 10px 12px;
            font-weight: 450 !important;
            color: var(--text);
            cursor: pointer;
            transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
        }

        .summary-day:hover {
            background: #eef2ff;
            color: var(--text);
            box-shadow: 0 6px 16px rgba(37, 99, 235, .12);
            transform: translateY(-1px);
        }

        .summary-day span {
            display: block;
            color: var(--muted);
            font-size: .85rem;
            font-weight: 450;
            margin-top: 2px;
        }

        .card {
            scroll-margin-top: 18px;
        }

        @media (max-width: 760px) {
            .summary-main {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        button,
        input,
        select {
            font: inherit;
        }

        button {
            border: 0;
            border-radius: 999px;
            padding: 10px 16px;
            background: var(--primary);
            color: white;
            cursor: pointer;
            font-weight: 700;
            transition: transform .15s ease, background .15s ease, opacity .15s ease;
        }

        button:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: .45;
            cursor: not-allowed;
            transform: none;
        }

        button.secondary {
            background: #eef2ff;
            color: #1e40af;
        }

        button.secondary:hover {
            background: #dbeafe;
        }

        button.danger {
            background: var(--danger);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 18px;
        }

        .card {
            background: rgba(255,255,255,.9);
            backdrop-filter: blur(8px);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 18px;
            animation: fadeIn .35s ease both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .day-title {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--line);
            padding-bottom: 14px;
        }

        .day-title h2 {
            margin: 0;
            font-size: clamp(1.45rem, 3vw, 2rem);
            line-height: 1.1;
            letter-spacing: -0.04em;
        }

        .date {
            font-size: 1em;
            font-weight: 600;
            margin-left: 30px;
        }

        .shift {
            position: relative;
            border: 1px solid color-mix(in srgb, var(--shift-color, var(--line)) 55%, white);
            border-left: 8px solid var(--shift-color, var(--line));
            border-radius: 14px;
            padding: 14px;
            margin-top: 12px;
            background: color-mix(in srgb, var(--shift-color, #fff) 16%, white);
        }

        .shifts-row {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
            align-items: stretch;
        }

        .shifts-row .shift {
            margin-top: 0;
            height: 100%;
        }

        .shift-head {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: flex-start;
        }

        .shift-name {
            font-weight: 800;
            font-size: 1.05rem;
            color: var(--shift-color-dark, var(--text));
        }

        .time {
            color: var(--muted);
            margin-top: 2px;
        }

        .badge {
            border-radius: 999px;
            padding: 6px 10px;
            font-weight: 800;
            font-size: .85rem;
            background: #ecfdf3;
            color: var(--ok);
            white-space: nowrap;
        }

        .badge.full {
            background: #fef2f2;
            color: var(--danger);
        }

        .badge.low {
            background: #fffbeb;
            color: #b45309;
        }

        .names-label {
            margin: 12px 0 6px;
            color: var(--muted);
            font-size: .85rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .04em;
        }

        .names {
            margin: 12px 0;
            padding: 0;
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .names li {
            background: #f2f4f7;
            border: 1px solid #e4e7ec;
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 1.2rem;
        }

        .empty {
            color: var(--muted);
            font-style: italic;
            margin: 12px 0;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 48px 24px;
            color: var(--muted);
        }

        .empty-state .empty-icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .empty-state p {
            margin: 0;
            font-size: 1.1rem;
        }

        dialog {
            border: 0;
            border-radius: 22px;
            padding: 0;
            width: min(720px, calc(100% - 28px));
            box-shadow: 0 24px 80px rgba(15, 23, 42, .35);
        }

        dialog::backdrop {
            background: rgba(15, 23, 42, .45);
        }

        .modal,
        .modal-inner {
            padding: 22px;
            background: white;
            border-radius: 22px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .modal h3,
        .modal-header h2 {
            margin: 0;
            font-size: 1.4rem;
        }

        .modal p {
            margin: 0 0 18px;
            color: var(--muted);
        }

        .close-btn {
            background: #f2f4f7;
            color: var(--text);
            border-radius: 999px;
            padding: 6px 12px;
            font-size: .9rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .close-btn:hover {
            background: #e4e7ec;
            transform: none;
        }

        .confirm-box {
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            border-radius: 12px;
            padding: 10px 14px;
            margin-bottom: 14px;
            font-size: .95rem;
            line-height: 1.35;
        }

        .confirm-box strong {
            display: inline;
            margin: 0 8px 0 0;
            color: var(--primary-dark);
            white-space: nowrap;
        }

        .shift-summary {
            display: inline;
        }

        .shift-summary-row {
            display: inline;
            margin-right: 14px;
            white-space: nowrap;
        }

        .shift-summary-row span:first-child {
            color: var(--muted);
            font-weight: 800;
            font-size: .88rem;
            margin-right: 4px;
        }

        .shift-summary-row span:last-child {
            color: var(--text);
            font-weight: 750;
        }

        label {
            display: block;
            font-weight: 700;
            margin: 12px 0 6px;
        }

        input:not([type="checkbox"]),
        select {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 11px 12px;
            background: white;
        }

        input[type="checkbox"] {
            width: auto;
            accent-color: var(--primary);
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
            margin-top: 18px;
        }

        .my-shift {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 10px;
            align-items: center;
            border-top: 1px solid var(--line);
            padding: 12px 0;
        }

        .gela-options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
        }

        .gela-options label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            margin: 0;
            padding: 7px 10px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: #f8fafc;
            font-weight: 650;
        }

        #toast {
            width: min(420px, calc(100% - 32px));
            border-radius: 18px;
            padding: 0;
            overflow: hidden;
        }

        #toast::backdrop {
            background: rgba(15, 23, 42, .22);
        }

        .toast-inner {
            padding: 18px 20px;
            background: #ffffff;
            border-left: 6px solid var(--primary);
            display: grid;
            gap: 14px;
        }

        #toastmsg {
            font-weight: 750;
            line-height: 1.4;
            color: var(--text);
        }

        .toast-actions {
            display: flex;
            justify-content: flex-end;
        }

        .toast-actions button {
            padding: 8px 14px;
        }

        @media (max-width: 640px) {
            main {
                width: calc(100% - 20px);
            }

            .my-shift {
                grid-template-columns: 1fr;
            }

            .actions {
                justify-content: stretch;
            }

            .actions button {
                width: 100%;
            }

            .header-top {
                flex-direction: column;
                align-items: center;
            }

            .topbar {
                align-items: stretch;
            }

            .topbar .status {
                width: 100%;
            }

            #reloadBtn {
                width: 100%;
                padding: 8px 14px;
                font-size: .92rem;
            }

            .shift button {
                width: 100%;
                margin-top: 8px;
            }

            .shifts-row {
                grid-template-columns: 1fr;
            }

            .shift-summary,
            .shift-summary-row {
                display: block;
                white-space: normal;
            }

            .shift-summary-row {
                margin-top: 4px;
            }

            h1 {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-top">
            <div class="lang-toggle">
                <button id="btnEs" class="active" onclick="setLang('es')">ES</button>
                <button id="btnEu" onclick="setLang('eu')">EU</button>
            </div>

            <h1 id="mainTitle">Turnos barraka ikastola</h1>

            <button class="my-shifts-cta" onclick="scrollToMyShifts()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="8" r="4" />
                    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
                </svg>
                <span id="myShiftsCta">Consultar / cambiar mis turnos</span>
            </button>
        </div>

        <p class="subtitle" id="headerSubtitle">Consulta los turnos disponibles y apúntate. En cada turno aparecerá el nombre y apellidos de las personas inscritas.</p>
    </header>

    <main>
        <section class="topbar">
            <div class="status" id="status">Cargando turnos...</div>
            <button class="secondary" id="reloadBtn">Actualizar</button>
        </section>

        <section class="summary-card" id="summaryCard" aria-live="polite"></section>
        <section class="grid" id="shiftGrid"></section>
    </main>

    <dialog id="toast">
        <div class="toast-inner">
            <div id="toastmsg"></div>
            <div class="toast-actions">
                <button type="button" class="secondary" onclick="$('toast').close()">Aceptar</button>
            </div>
        </div>
    </dialog>

    <dialog id="myShiftsDialog" aria-labelledby="myPanelTitle">
        <div class="modal-inner">
            <div class="modal-header">
                <h2 id="myPanelTitle">Mis turnos</h2>
                <button class="close-btn" onclick="$('myShiftsDialog').close()" aria-label="Cerrar">✕</button>
            </div>
            <p class="subtitle" id="myPanelSubtitle" style="margin:0 0 16px;">Introduce tu email y apellido para ver, cambiar o borrar tus inscripciones.</p>
            <div>
                <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px;">
                    <div>
                        <label for="myEmail"><span id="labelMyEmail">Email</span><span class="required-star">*</span></label>
                        <input id="myEmail" type="email" required autocomplete="email" />
                    </div>
                    <div>
                        <label for="myApellido"><span id="labelMyApellido">Apellido</span><span class="required-star">*</span></label>
                        <input id="myApellido" required autocomplete="family-name" placeholder="Ej.: García" />
                    </div>
                </div>
                <div class="actions" style="justify-content:flex-start; margin-top: 14px;">
                    <button id="myFormBtn" onclick="loadMyShifts()">Ver mis turnos</button>
                </div>
            </div>
            <div id="myShifts"></div>
        </div>
    </dialog>

    <dialog id="signupDialog" aria-labelledby="dlgSignupTitle">
        <div class="modal" id="signupModal">
            <div class="modal-header">
                <h3 id="dlgSignupTitle">Apuntarme</h3>
                <button class="close-btn" onclick="$('signupDialog').close()" aria-label="Cerrar">✕</button>
            </div>

            <div class="confirm-box" id="signupConfirmBox">
                <strong id="signupConfirmLabel">Turno seleccionado:</strong>
                <span id="signupShiftText" class="shift-summary"></span>
            </div>

            <input type="hidden" id="signupShiftId" />

            <label for="nombre"><span id="labelNombre">Nombre</span><span class="required-star">*</span></label>
            <input id="nombre" required autocomplete="given-name" />

            <label for="apellido"><span id="labelApellido">Apellido</span><span class="required-star">*</span></label>
            <input id="apellido" required autocomplete="family-name" />

            <label for="email"><span id="labelEmail">Email</span><span class="required-star">*</span></label>
            <input id="email" type="email" required autocomplete="email" />

            <label for="dni"><span id="labelDni">DNI / NAN</span><span class="required-star">*</span></label>
            <input id="dni" required />

            <label id="labelGela">Clase</label>
            <div id="gela_group" class="gela-options"></div>

            <div class="actions">
                <button type="button" class="secondary" id="dlgSignupCancel" onclick="$('signupDialog').close()">Cancelar</button>
                <button type="button" id="dlgSignupConfirm" onclick="signup()">Confirmar inscripción</button>
            </div>
        </div>
    </dialog>

    <dialog id="changeDialog" aria-labelledby="dlgChangeTitle">
        <div class="modal" id="changeModal">
            <div class="modal-header">
                <h3 id="dlgChangeTitle">Cambiar turno</h3>
                <button class="close-btn" onclick="$('changeDialog').close()" aria-label="Cerrar">✕</button>
            </div>
            <p id="changeShiftText"></p>
            <input type="hidden" id="changeInscriptionId" />
            <label for="newShiftId"><span id="labelNewShift">Nuevo turno</span><span class="required-star">*</span></label>
            <select id="newShiftId" required></select>
            <div class="actions">
                <button type="button" class="secondary" id="dlgChangeCancel" onclick="$('changeDialog').close()">Cancelar</button>
                <button type="button" id="dlgChangeConfirm" onclick="changeInscription()">Cambiar</button>
            </div>
        </div>
    </dialog>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw2DgiE3wfQRtvAAFkQecG-var2jvrBxyYfoUR4tF7oB7Toul7Y7s7dcc_AxkuILW2C/exec";

                headerSubtitle: "Kontsultatu txanda libreak eta eman izena. Txanda bakoitzean izena eman duten pertsonen izen-abizenak agertuko dira.",
                myShiftsCta: "Nire txandak kontsultatu / aldatu",
                reloadBtn: "Eguneratu",
                reloadingBtn: "Eguneratzen...",
                statusLoading: "Txandak kargatzen...",
                statusLoaded: n => `Eguneratuta. ${n} txanda kargatuta.`,
                myPanelTitle: "Nire txandak",
                myPanelSubtitle: "Sartu zure emaila eta abizena zure izen-emateak ikusi, aldatu edo ezabatzeko.",
                labelMyEmail: "Emaila",
                labelMyApellido: "Abizena",
                myFormBtn: "Nire txandak ikusi",
                dlgSignupTitle: "Izena eman",
                signupConfirmLabel: "Hautatutako txanda:",
                labelNombre: "Izena",
                labelApellido: "Abizena",
                labelEmail: "Emaila",
                labelDni: "DNI / NAN",
                labelGela: "Ikastolan seme-alabak badituzu, adierazi zein mailatan. Aukera bat baino gehiago hauta ditzakezu",
                dlgSignupCancel: "Utzi",
                dlgSignupConfirm: "Izena ematea baieztatu",
                dlgChangeTitle: "Txanda aldatu",
                labelNewShift: "Txanda berria",
                dlgChangeCancel: "Utzi",
                dlgChangeConfirm: "Aldatu",
                badgeFull: "Beteta",
                badgeFew: (free, total) => `${free}/${total} falta`,
                btnSignup: "Izena eman",
                btnFull: "Txanda beteta",
                noSignups: "Oraindik ez dago inor izena emanda.",
                namesLabel: "Izena eman duten pertsonak",
                summaryTurns: "txanda erabilgarri",
                summaryFree: "betetzeko falta direnak",
                summaryPeople: "izena eman duten pertsonak",
                signupDay: "Eguna",
                signupShift: "Txanda",
                signupTime: "Ordua",
                noAvailable: "Ez dago txanda erabilgarririk",
                toastSignupOk: "Izena ematea burutu da.",
                toastChangeOk: "Txanda aldatuta.",
                toastDeleteOk: "Izena ematea ezabatuta.",
                confirmDelete: "Ziur zaude izen-emate hau ezabatu nahi duzula?",
                btnChange: "Aldatu",
                btnDelete: "Ezabatu",
                noMyShifts: "Ez dago datu horiekin lotutako izen-emate aktiborik.",
                emptyStateTitle: "Ez dago txanda erabilgarririk",
                emptyStateText: "Itzuli geroago edo sakatu Eguneratu.",
                changePrefix: "Aldatuko duzu:",
                fillAllFields: "Bete eremu guztiak.",
                invalidEmail: "Emaila ez da baliozkoa.",
                invalidSurname: "Sartu baliozko abizena."
            }
        };

        let lang = localStorage.getItem("lang") || "es";
        const state = { shifts: [], myIdentity: null, myInscriptions: [], opciones: {} };
        const $ = id => document.getElementById(id);

        function t(key, ...args) {
            const val = TEXTS[lang][key];
            return typeof val === "function" ? val(...args) : val;
        }

        function setLang(l) {
            lang = l;
            localStorage.setItem("lang", l);
            applyTexts();
            renderShifts();
            if (state.myInscriptions.length) renderMyShifts();
        }

        function applyTexts() {
            document.documentElement.lang = lang;
            $("btnEs").classList.toggle("active", lang === "es");
            $("btnEu").classList.toggle("active", lang === "eu");

            const ids = [
                "mainTitle", "headerSubtitle", "myShiftsCta", "myPanelTitle", "myPanelSubtitle",
                "labelMyEmail", "labelMyApellido", "myFormBtn",
                "dlgSignupTitle", "signupConfirmLabel", "labelNombre", "labelApellido", "labelEmail", "labelDni", "labelGela",
                "dlgSignupCancel", "dlgSignupConfirm",
                "dlgChangeTitle", "labelNewShift", "dlgChangeCancel", "dlgChangeConfirm"
            ];

            ids.forEach(id => {
                const el = $(id);
                if (el) el.textContent = t(id);
            });

            $("reloadBtn").textContent = t("reloadBtn");

            document.querySelectorAll(".close-btn").forEach(btn => {
                btn.setAttribute("aria-label", lang === "eu" ? "Itxi" : "Cerrar");
            });

            const s = $("status");
            if (s && s.dataset.loaded) s.textContent = t("statusLoaded", s.dataset.count || 0);
        }

        function scrollToMyShifts() {
            applyTexts();
            clearInvalidFields(["myEmail", "myApellido"]);
            $("myShiftsDialog").showModal();
            setTimeout(() => $("myEmail").focus(), 80);
        }

        function showToast(message) {
            $("toastmsg").textContent = message;
            if (!$("toast").open) $("toast").showModal();

            clearTimeout(showToast.timer);
            showToast.timer = setTimeout(() => {
                if ($("toast").open) $("toast").close();
            }, 3200);
        }

        function scrollToDay(fecha) {
            const card = document.querySelector(`[data-day-card="${CSS.escape(fecha)}"]`);
            if (!card) return;
            card.scrollIntoView({ behavior: "smooth", block: "start" });
        }

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function normalizeText(value) {
            return String(value || "")
                .trim()
                .replace(/\s+/g, " ")
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .toLocaleLowerCase(lang === "eu" ? "eu-ES" : "es-ES");
        }

        function isValidSurname(apellido) {
            const normalized = normalizeText(apellido);
            return normalized.length >= 2 && /^[a-záéíóúüñç\s'-]+$/i.test(apellido.trim());
        }

        function clearInvalidFields(ids) {
            ids.forEach(id => {
                const el = $(id);
                if (el) el.classList.remove("user-invalid");
            });
        }

        function markInvalidFields(ids) {
            let firstInvalid = null;

            ids.forEach(id => {
                const el = $(id);
                if (!el) return;

                const isEmpty = !String(el.value || "").trim();
                el.classList.toggle("user-invalid", isEmpty);

                if (isEmpty && !firstInvalid) firstInvalid = el;
            });

            if (firstInvalid) firstInvalid.focus();
            return Boolean(firstInvalid);
        }

        function validateRequired(ids) {
            if (markInvalidFields(ids)) {
                showToast(t("fillAllFields"));
                return false;
            }
            return true;
        }

        function normalizeDateLabel(isoDate) {
            const date = new Date(`${isoDate}T12:00:00`);
            return new Intl.DateTimeFormat(lang === "eu" ? "eu-ES" : "es-ES", { day: "2-digit", month: "long" }).format(date);
        }

        async function api(action, payload = {}, method = "POST") {
            if (!API_URL || API_URL.includes("PON_AQUI")) {
                throw new Error("Falta configurar la URL de Google Apps Script en index.html.");
            }

            try {
                let response;
                if (method === "GET") {
                    const url = new URL(API_URL);
                    url.searchParams.set("action", action);
                    Object.entries(payload).forEach(([k, v]) => url.searchParams.set(k, v));
                    response = await fetch(url.toString());
                } else {
                    response = await fetch(API_URL, {
                        method: "POST",
                        body: JSON.stringify({ action, ...payload }),
                        headers: { "Content-Type": "text/plain;charset=utf-8" }
                    });
                }

                if (!response.ok) throw new Error(`Error HTTP ${response.status}`);

                const data = await response.json();
                if (!data.ok) throw new Error(data.error || "Error desconocido");
                return data;
            } catch (error) {
                throw new Error(error.message || "No se ha podido conectar con el servidor.");
            }
        }

        async function loadData() {
            const reloadBtn = $("reloadBtn");
            reloadBtn.disabled = true;
            reloadBtn.textContent = t("reloadingBtn");

            try {
                const statusEl = $("status");
                statusEl.textContent = t("statusLoading");
                const data = await api("getData", {}, "GET");
                state.shifts = data.turnos || [];
                state.opciones = data.opciones || {};
                renderShifts();
                statusEl.textContent = t("statusLoaded", state.shifts.length);
                statusEl.dataset.loaded = "1";
                statusEl.dataset.count = state.shifts.length;
            } catch (error) {
                $("status").textContent = error.message;
                showToast(error.message);
            } finally {
                reloadBtn.disabled = false;
                reloadBtn.textContent = t("reloadBtn");
            }
        }

        function groupByDate(shifts) {
            return shifts.reduce((acc, shift) => {
                acc[shift.fecha] ||= [];
                acc[shift.fecha].push(shift);
                return acc;
            }, {});
        }

        function compareDates(a, b) {
            return String(a).localeCompare(String(b));
        }

        function getShiftColor(shift) {
            const color = String(shift.color || "").trim();
            return color || DEFAULT_SHIFT_COLOR;
        }

        function getShiftStats() {
            return state.shifts.reduce((acc, shift) => {
                const plazas = Number(shift.plazas) || 0;
                const inscritos = Array.isArray(shift.inscritos) ? shift.inscritos.length : 0;
                const libres = Math.max(plazas - inscritos, 0);

                acc.turnos += 1;
                acc.plazasLibres += libres;
                acc.inscritos += inscritos;

                if (!acc.dias[shift.fecha]) {
                    acc.dias[shift.fecha] = {
                        fecha: shift.fecha,
                        dia: shift.dia || "",
                        turnos: 0,
                        libres: 0,
                        inscritos: 0
                    };
                }

                acc.dias[shift.fecha].turnos += 1;
                acc.dias[shift.fecha].libres += libres;
                acc.dias[shift.fecha].inscritos += inscritos;

                return acc;
            }, {
                turnos: 0,
                plazasLibres: 0,
                inscritos: 0,
                dias: {}
            });
        }

        function renderSummary() {
            const summary = $("summaryCard");
            const stats = getShiftStats();
            const dias = Object.values(stats.dias).sort((a, b) => String(a.fecha).localeCompare(String(b.fecha)));

            if (!stats.turnos) {
                summary.classList.remove("show");
                summary.innerHTML = "";
                return;
            }

            summary.classList.add("show");
            summary.innerHTML = `
                <div class="summary-main">
                    <div class="summary-item">
                        <span class="summary-value">${stats.turnos}</span>
                        <span class="summary-label">${t("summaryTurns")}</span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-value">${stats.plazasLibres}</span>
                        <span class="summary-label">${t("summaryFree")}</span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-value">${stats.inscritos}</span>
                        <span class="summary-label">${t("summaryPeople")}</span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-value">${dias.length}</span>
                        <span class="summary-label">${lang === "eu" ? "egun" : "días con turnos"}</span>
                    </div>
                </div>
                <div class="summary-days">
                    ${dias.map(day => `
                        <button type="button" class="summary-day" data-scroll-day="${escapeHtml(day.fecha)}">
                            ${normalizeDateLabel(day.fecha)} <br> ${escapeHtml(day.dia)}
                            <span>
                                ${day.libres <= 0
                                    ? (lang === "eu" ? "Dena beteta" : "Todo cubierto")
                                    : (lang === "eu" ? `${day.libres} pertsona falta dira` : `Faltan ${day.libres} personas`)}
                            </span>
                        </button>
                    `).join("")}
                </div>
            `;

            summary.querySelectorAll("[data-scroll-day]").forEach(button => {
                button.addEventListener("click", () => scrollToDay(button.dataset.scrollDay));
            });
        }

        function getBadgeClass(free) {
            if (free <= 0) return "full";
            if (free <= 2) return "low";
            return "";
        }

        function renderShifts() {
            const grid = $("shiftGrid");
            grid.innerHTML = "";

            const grouped = groupByDate(state.shifts);
            const entries = Object.entries(grouped).sort(([fechaA], [fechaB]) => compareDates(fechaA, fechaB));

            renderSummary();

            if (!entries.length) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🍺</div>
                        <p><strong>${t("emptyStateTitle")}</strong></p>
                        <p>${t("emptyStateText")}</p>
                    </div>`;
                return;
            }

            entries.forEach(([fecha, shifts], cardIndex) => {
                shifts.sort((a, b) => String(a.hora_inicio).localeCompare(String(b.hora_inicio)));

                const card = document.createElement("article");
                card.className = "card";
                card.dataset.dayCard = fecha;
                card.style.animationDelay = `${cardIndex * 60}ms`;

                card.innerHTML = `
                    <div class="day-title">
                        <h2>${escapeHtml(shifts[0].dia || "")} <span class="date">${normalizeDateLabel(fecha)}</span></h2>
                    </div>
                    <div class="shifts-row"></div>
                `;

                const shiftsRow = card.querySelector(".shifts-row");

                shifts.forEach(shift => {
                    const inscritos = Array.isArray(shift.inscritos) ? shift.inscritos : [];
                    const plazas = Number(shift.plazas) || 0;
                    const libres = plazas - inscritos.length;
                    const full = libres <= 0;

                    const people = inscritos.length
                        ? `<p class="names-label">${t("namesLabel")}</p>
                           <ul class="names">
                               ${inscritos.map(p => `<li>${escapeHtml(p.nombre)} ${escapeHtml(p.apellido)}</li>`).join("")}
                           </ul>`
                        : `<p class="empty">${t("noSignups")}</p>`;

                    const badgeClass = getBadgeClass(libres);
                    const color = getShiftColor(shift);

                    const div = document.createElement("div");
                    div.className = "shift";
                    div.style.setProperty("--shift-color", color);

                    div.innerHTML = `
                        <div class="shift-head">
                            <div>
                                <div class="shift-name">${escapeHtml(shift.tipo)}</div>
                                <div class="time">${escapeHtml(shift.hora_inicio)}–${escapeHtml(shift.hora_fin)}</div>
                            </div>
                            <span class="badge ${badgeClass}">
                                ${full ? t("badgeFull") : t("badgeFew", libres, shift.plazas)}
                            </span>
                        </div>
                        ${people}
                        <button ${full ? "disabled" : ""} data-signup="${shift.id_turno}">
                            ${full ? t("btnFull") : t("btnSignup")}
                        </button>
                    `;

                    shiftsRow.appendChild(div);
                });

                grid.appendChild(card);
            });

            document.querySelectorAll("[data-signup]").forEach(button => {
                button.addEventListener("click", () => openSignup(button.dataset.signup));
            });
        }

        function openSignup(idTurno) {
            const shift = state.shifts.find(s => s.id_turno === idTurno);
            if (!shift) return;

            clearInvalidFields(["nombre", "apellido", "email", "dni"]);

            $("signupShiftId").value = idTurno;
            $("signupShiftText").innerHTML = `
                <span class="shift-summary-row"><span>${t("signupDay")}:</span><span>${escapeHtml(shift.dia)}, ${normalizeDateLabel(shift.fecha)}</span></span>
                <span class="shift-summary-row"><span>${t("signupShift")}:</span><span>${escapeHtml(shift.tipo)}</span></span>
                <span class="shift-summary-row"><span>${t("signupTime")}:</span><span>${escapeHtml(shift.hora_inicio)}–${escapeHtml(shift.hora_fin)}</span></span>
            `;

            ["nombre", "apellido", "email", "dni"].forEach(id => $(id).value = "");

            const group = $("gela_group");
            group.innerHTML = "";

            (state.opciones.gela || []).forEach(op => {
                const label = document.createElement("label");
                const cb = document.createElement("input");
                cb.type = "checkbox";
                cb.value = op;
                cb.name = "gela";
                label.appendChild(cb);
                label.appendChild(document.createTextNode(op));
                group.appendChild(label);
            });

            applyTexts();
            $("signupDialog").showModal();
        }

        async function signup() {
            const btn = $("dlgSignupConfirm");
            const nombre = $("nombre").value.trim();
            const apellido = $("apellido").value.trim();
            const email = $("email").value.trim();
            const dni = $("dni").value.trim();
            const checked = [...document.querySelectorAll('input[name="gela"]:checked')];
            const gela = checked.map(cb => cb.value).join(", ");

            if (!validateRequired(["nombre", "apellido", "email", "dni"])) return;
            if (!isValidEmail(email)) return showToast(t("invalidEmail"));

            btn.disabled = true;
            try {
                await api("inscribir", {
                    id_turno: $("signupShiftId").value,
                    nombre,
                    apellido,
                    email,
                    dni,
                    gela
                });
                $("signupDialog").close();
                showToast(t("toastSignupOk"));
                await loadData();
            } catch (error) {
                showToast(error.message);
            } finally {
                btn.disabled = false;
            }
        }

        async function loadMyShifts() {
            const btn = $("myFormBtn");
            const email = $("myEmail").value.trim();
            const apellido = $("myApellido").value.trim();

            if (!validateRequired(["myEmail", "myApellido"])) return;
            if (!isValidEmail(email)) return showToast(t("invalidEmail"));
            if (!isValidSurname(apellido)) return showToast(t("invalidSurname"));

            state.myIdentity = { email, apellido: normalizeText(apellido) };
            btn.disabled = true;

            try {
                const data = await api("misTurnos", state.myIdentity);
                state.myInscriptions = data.inscripciones || [];
                renderMyShifts();
            } catch (error) {
                showToast(error.message);
            } finally {
                btn.disabled = false;
            }
        }

        function renderMyShifts() {
            const box = $("myShifts");
            if (!state.myInscriptions.length) {
                box.innerHTML = `<p class="empty">${t("noMyShifts")}</p>`;
                return;
            }

            box.innerHTML = state.myInscriptions.map(item => `
                <div class="my-shift">
                    <div>
                        <strong>${escapeHtml(item.dia)}, ${normalizeDateLabel(item.fecha)} · ${escapeHtml(item.tipo)}</strong><br />
                        <span class="time">${escapeHtml(item.hora_inicio)}–${escapeHtml(item.hora_fin)}</span>
                    </div>
                    <button class="secondary" data-change="${item.id_inscripcion}">${t("btnChange")}</button>
                    <button class="danger" data-delete="${item.id_inscripcion}">${t("btnDelete")}</button>
                </div>
            `).join("");

            document.querySelectorAll("[data-change]").forEach(b =>
                b.addEventListener("click", () => openChange(b.dataset.change)));
            document.querySelectorAll("[data-delete]").forEach(b =>
                b.addEventListener("click", () => deleteInscription(b.dataset.delete, b)));
        }

        function openChange(idInscripcion) {
            const current = state.myInscriptions.find(i => i.id_inscripcion === idInscripcion);
            if (!current) return;

            $("changeInscriptionId").value = idInscripcion;
            $("changeShiftText").textContent = `${t("changePrefix")} ${current.dia}, ${normalizeDateLabel(current.fecha)} · ${current.tipo}`;

            const options = state.shifts
                .filter(s => s.id_turno !== current.id_turno)
                .filter(s => Number(s.inscritos.length) < Number(s.plazas))
                .sort((a, b) => String(a.fecha).localeCompare(String(b.fecha)) || String(a.hora_inicio).localeCompare(String(b.hora_inicio)))
                .map(s => `<option value="${s.id_turno}">${s.dia}, ${normalizeDateLabel(s.fecha)} · ${s.tipo} · ${s.hora_inicio}–${s.hora_fin}</option>`)
                .join("");

            const hasOptions = Boolean(options);
            $("newShiftId").innerHTML = options || `<option value="">${t("noAvailable")}</option>`;
            $("dlgChangeConfirm").disabled = !hasOptions;
            applyTexts();
            $("changeDialog").showModal();
        }

        async function changeInscription() {
            const btn = $("dlgChangeConfirm");
            if (!$("newShiftId").value) return;

            btn.disabled = true;
            try {
                await api("cambiar", {
                    ...state.myIdentity,
                    id_inscripcion: $("changeInscriptionId").value,
                    nuevo_id_turno: $("newShiftId").value
                });
                $("changeDialog").close();
                showToast(t("toastChangeOk"));
                await loadData();
                const data = await api("misTurnos", state.myIdentity);
                state.myInscriptions = data.inscripciones || [];
                renderMyShifts();
            } catch (error) {
                showToast(error.message);
            } finally {
                btn.disabled = false;
            }
        }

        async function deleteInscription(idInscripcion, button) {
            const ok = confirm(t("confirmDelete"));
            if (!ok) return;

            if (button) button.disabled = true;
            try {
                await api("borrar", { ...state.myIdentity, id_inscripcion: idInscripcion });
                showToast(t("toastDeleteOk"));
                await loadData();
                const data = await api("misTurnos", state.myIdentity);
                state.myInscriptions = data.inscripciones || [];
                renderMyShifts();
            } catch (error) {
                showToast(error.message);
            } finally {
                if (button) button.disabled = false;
            }
        }

        function escapeHtml(value) {
            return String(value ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        document.addEventListener("input", event => {
            const el = event.target;
            if (el && el.classList && el.classList.contains("user-invalid") && String(el.value || "").trim()) {
                el.classList.remove("user-invalid");
            }
        });

        $("reloadBtn").addEventListener("click", loadData);

        applyTexts();
        loadData();
    </script>
</body>
</html>
